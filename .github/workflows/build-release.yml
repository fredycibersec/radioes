name: Build & Release .deb

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get install -y dpkg-dev

      - name: Build .deb package
        run: bash build-deb.sh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Upload .deb as release asset
        uses: softprops/action-gh-release@v2
        with:
          name: "RadioES ${{ github.ref_name }}"
          body: |
            ## Instalación

            Descarga el archivo `.deb` y ejecuta:

            ```bash
            sudo apt install ./radioes_${{ steps.version.outputs.VERSION }}_all.deb
            ```

            Consulta el [README](https://github.com/${{ github.repository }}#readme) para más información.
          files: dist/radioes_${{ steps.version.outputs.VERSION }}_all.deb
          draft: false
          prerelease: false
